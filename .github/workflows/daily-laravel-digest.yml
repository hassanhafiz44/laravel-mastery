name: Daily Laravel Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 7 AM UTC daily (adjust to your timezone)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate today's Laravel digest
        run: python scripts/generate_digest.py

      - name: Commit and push digest
        run: |
          git config user.name "Hassan"
          git config user.email "hassanhafiz44@gmail.com"
          git add laravel-digest/
          git diff --staged --quiet || git commit -m "study: Laravel digest $(date +%Y-%m-%d)"
          git push
